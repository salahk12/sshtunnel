<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSH Tunnel Panel</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#2a3140;
  --txt:#e6edf3; --muted:#8b949e; --accent:#3b82f6; --accent2:#2563eb;
  --ok:#3fb950; --bad:#f85149; --warn:#d29922; --radius:12px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:Vazirmatn,"Segoe UI",Tahoma,system-ui,sans-serif;font-size:14px}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;
  padding:9px 14px;font-size:14px;background:var(--accent);color:#fff;transition:.15s}
button:hover{background:var(--accent2)}
button.ghost{background:transparent;border:1px solid var(--border);color:var(--txt)}
button.ghost:hover{background:var(--panel2)}
button.danger{background:var(--bad)}
button.sm{padding:5px 10px;font-size:12px}
input,select{font-family:inherit;width:100%;padding:9px 11px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg);color:var(--txt);font-size:14px}
label{display:block;margin:0 0 6px;color:var(--muted);font-size:12px}
.field{margin-bottom:14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>.field{flex:1;min-width:140px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.muted{color:var(--muted)}
.hidden{display:none!important}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.b-ok{background:rgba(63,185,80,.15);color:var(--ok)}
.b-bad{background:rgba(248,81,73,.15);color:var(--bad)}
.b-warn{background:rgba(210,153,34,.15);color:var(--warn)}
.b-off{background:rgba(139,148,158,.15);color:var(--muted)}

/* layout */
header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;background:var(--panel);border-bottom:1px solid var(--border)}
header .logo{font-weight:700;font-size:16px;display:flex;gap:8px;align-items:center}
header nav{display:flex;gap:6px}
header nav button{background:transparent;color:var(--muted)}
header nav button.active{color:var(--txt);background:var(--panel2)}
main{max-width:1100px;margin:24px auto;padding:0 18px}
h2{margin:0 0 4px;font-size:20px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}

/* tunnel list */
.tlist{display:grid;gap:14px}
.tcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;
  display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.tcard .name{font-weight:600;font-size:16px}
.tcard .sub{color:var(--muted);font-size:12px;margin-top:3px}
.stats{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.stat .k{color:var(--muted);font-size:11px}
.stat .v{font-weight:600;font-size:14px}
.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;
  align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:50}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  width:640px;max-width:100%;padding:22px}
.modal h3{margin:0 0 16px}
.fwd-row{display:flex;gap:8px;align-items:end;margin-bottom:8px}
.fwd-row .field{margin:0}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.loginbox{width:360px;max-width:100%}
.err{background:rgba(248,81,73,.12);color:var(--bad);padding:9px 12px;border-radius:8px;
  margin-bottom:12px;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border);padding:12px 18px;border-radius:10px;
  z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}
pre.logs{background:#0a0d12;border:1px solid var(--border);border-radius:8px;padding:12px;
  max-height:340px;overflow:auto;font-size:12px;direction:ltr;text-align:left;white-space:pre-wrap}
canvas{width:100%;height:120px;background:#0a0d12;border:1px solid var(--border);border-radius:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.kv:last-child{border:none}
.kv .k{color:var(--muted)}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>
<div id="app"></div>
<script>
window.BASE = "__BASE__";
</script>
<script src="app.js"></script>
</body>
</html>
